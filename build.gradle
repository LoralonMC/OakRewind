plugins {
    id 'java'
    id("com.gradleup.shadow") version "9.3.1"
}

group = 'dev.oakheart'
version = '1.0.0'

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

dependencies {
    compileOnly("io.papermc.paper:paper-api:1.21.10-R0.1-SNAPSHOT")
    implementation("org.bstats:bstats-bukkit:3.1.0")
    implementation("dev.oakheart:oakheart-core:1.1.0")
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

compileJava {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs += ['-Xlint:deprecation', '-Xlint:unchecked']
}

processResources {
    def props = [version: version]
    inputs.properties props
    filteringCharset 'UTF-8'
    filesMatching(['plugin.yml', 'paper-plugin.yml']) {
        expand props
    }
}

shadowJar {
    relocate 'org.bstats', 'dev.oakheart.oakrewind.bstats'
    relocate 'dev.oakheart.config', 'dev.oakheart.oakrewind.libs.config'
    relocate 'dev.oakheart.message', 'dev.oakheart.oakrewind.libs.message'
    relocate 'dev.oakheart.command', 'dev.oakheart.oakrewind.libs.command'
    relocate 'dev.oakheart.util', 'dev.oakheart.oakrewind.libs.util'
    archiveClassifier.set('')
}

build {
    dependsOn shadowJar
}
